models:
  - name: metricflow_time_spine
    description: |
      Required by dbt's semantic layer for time-grain aggregation (quarter
      grouping, period comparisons). One row per calendar day.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        tests: [unique, not_null]

semantic_models:
  - name: sem_fct_sales
    model: ref('fct_sales')
    defaults:
      agg_time_dimension: date_key
    entities:
      - name: sales_transaction
        type: primary
        expr: sales_key
      - name: customer
        type: foreign
        expr: customer_key
      - name: product
        type: foreign
        expr: product_key
      - name: region
        type: foreign
        expr: region_key
    dimensions:
      - name: date_key
        type: time
        type_params:
          time_granularity: day
      - name: is_late_arriving
        type: categorical
    measures:
      - name: gross_revenue
        agg: sum
        expr: gross_revenue
      - name: returns_amount
        agg: sum
        expr: returns_amount
      - name: net_revenue
        agg: sum
        expr: net_revenue
      - name: sales_quantity
        agg: sum
        expr: quantity

  - name: sem_fct_target
    model: ref('fct_target')
    defaults:
      agg_time_dimension: quarter_start_date
    entities:
      - name: sales_target
        type: primary
        expr: target_key
      - name: region
        type: foreign
        expr: region_key
    dimensions:
      - name: quarter_start_date
        type: time
        type_params:
          time_granularity: quarter
      - name: region_name
        type: categorical
    measures:
      - name: target_revenue
        agg: sum
        expr: target_revenue

  - name: sem_dim_product
    model: ref('dim_product')
    entities:
      - name: product
        type: primary
        expr: product_key
    dimensions:
      - name: category
        type: categorical

  - name: sem_dim_customer
    model: ref('dim_customer')
    entities:
      - name: customer
        type: primary
        expr: customer_key
    dimensions:
      - name: segment
        type: categorical
      - name: customer_id
        type: categorical

  - name: sem_dim_region
    model: ref('dim_region')
    entities:
      - name: region
        type: primary
        expr: region_key
    dimensions:
      - name: region_name
        type: categorical

metrics:
  - name: sales_gross_revenue
    label: Gross Revenue
    description: >
      Total gross revenue before returns. Distinct from sales_net_revenue —
      the agent must never treat "revenue" alone as unambiguous between the two.
    type: simple
    type_params:
      measure: gross_revenue

  - name: sales_net_revenue
    label: Net Revenue
    description: Gross revenue minus returns. The default "actuals" revenue figure.
    type: simple
    type_params:
      measure: net_revenue

  - name: sales_returns_amount
    label: Returns Amount
    description: Total dollar amount of returns. Base metric for sales_returns_rate.
    type: simple
    type_params:
      measure: returns_amount

  - name: sales_returns_rate
    label: Returns Rate
    description: Returns as a fraction of gross revenue.
    type: ratio
    type_params:
      numerator: sales_returns_amount
      denominator: sales_gross_revenue

  - name: sales_target_revenue
    label: Target Revenue
    description: Total target revenue. Base metric for sales_target_attainment.
    type: simple
    type_params:
      measure: target_revenue

  - name: sales_target_attainment
    label: Target Attainment
    description: >
      Net revenue as a fraction of the target for the same region and
      quarter. Joins sem_fct_sales and sem_fct_target via the shared region
      entity and quarter-grain time dimension.
    type: ratio
    type_params:
      numerator: sales_net_revenue
      denominator: sales_target_revenue
