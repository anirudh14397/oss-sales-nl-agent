version: 2

models:
  - name: dim_customer
    description: |
      One row per canonical customer, after collapsing near-duplicates via
      customer_crosswalk. merged_record_count > 1 flags customers where more
      than one raw record was merged — surfaced for transparency, not hidden.
      Grain: one row per canonical customer.
    columns:
      - name: customer_key
        description: Canonical surrogate key (deduplicated).
        tests: [unique, not_null]
      - name: segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Enterprise", "Mid-Market", "SMB"]
      - name: region_name_v1
        description: Home region under the pre-2024-07-01 hierarchy naming — see fct_sales for the resolved, date-aware region.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["North America", "EMEA", "APAC", "LATAM"]
      - name: merged_record_count
        description: How many raw customer records were merged into this canonical customer. 1 = no duplicates found.
        tests: [not_null]

  - name: dim_product
    description: "Passthrough of stg_dim_product. Grain: one row per product."
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Electronics", "Home & Garden", "Apparel", "Sporting Goods", "Office Supplies"]

  - name: dim_region
    description: |
      Passthrough SCD2 of both region hierarchy versions (pre/post the
      2024-07-01 APAC split). Grain: one row per (region_name, validity
      window) — region_name repeats across the two versions for regions that
      didn't rename (e.g. "North America" has both a pre- and post-split row).
    tests:
      # Business-grain check, not just the surrogate key: exactly one row
      # per (region_name, valid_from). A surrogate-key collision or a bug in
      # region_key generation wouldn't be caught by testing region_key alone.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - region_name
              - valid_from
    columns:
      - name: region_key
        tests: [unique, not_null]
      - name: region_name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["North America", "EMEA", "APAC", "LATAM", "APAC-North", "APAC-South"]

  - name: dim_date
    description: "Passthrough of stg_dim_date. Grain: one row per calendar day."
    columns:
      - name: date_key
        tests: [unique, not_null]

  - name: fct_sales
    description: |
      One row per VALID sales transaction, with customer dedup and
      date-aware region resolution applied (see docs/failure_cases.md §1-3
      for the messiness-handling decisions baked in here). Reported by
      transaction date_key, not load_date — is_late_arriving flags where
      they differ. Rows that failed business-logic validation (bad foreign
      keys, negative quantity/revenue, duplicate sales_key) are excluded
      here and land in fct_sales_quarantine instead — see
      docs/failure_cases.md §9. Grain: one row per sales_key.
    columns:
      - name: sales_key
        tests: [unique, not_null]
      - name: customer_key
        description: Canonical (deduplicated) customer key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: region_key
        description: Resolved as of the sale's transaction date — see model SQL for the APAC-split logic.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_key
      - name: is_late_arriving
        description: True when load_date differs from the transaction date_key (~2% of rows).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: fct_sales_quarantine
    description: |
      Sales rows that failed one or more business-logic checks in
      int_fact_sales_validated — bad/missing foreign keys, negative
      quantity or revenue, net exceeding gross, or a duplicate sales_key.
      Never included in fct_sales. Meant for review, not reporting — the
      agent's certified metrics never touch this table; only the
      exploratory SQL path can query it, and only ever labeled unverified.
      Grain: one row per invalid raw sales_key.
    columns:
      - name: sales_key
        tests: [not_null]
      - name: validation_errors
        description: Human-readable reason(s) this row was quarantined, semicolon-separated if more than one rule failed.
        tests: [not_null]

  - name: fct_target
    description: |
      One row per (region_key, quarter) target, filtered to drop rows where
      the region hierarchy version wasn't yet in effect for that quarter
      (see docs/failure_cases.md §5 — the source data double-counts without
      this filter). Grain: one row per target_key.
    tests:
      # Business-grain check: exactly one target per (region_key, year,
      # quarter). This is the direct test of the anti-double-counting fix in
      # fct_target.sql — target_key uniqueness alone wouldn't catch a
      # regression that reintroduced overlapping region-hierarchy versions.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - region_key
              - year
              - quarter
    columns:
      - name: target_key
        tests: [unique, not_null]
      - name: region_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_key
