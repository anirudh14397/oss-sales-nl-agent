version: 2

models:
  - name: int_customer_crosswalk
    description: |
      Maps every raw customer_key to its canonical customer_key, collapsing
      near-duplicate customer records (see docs/failure_cases.md §1 for the
      matching strategy and its known limitation). Grain: one row per raw
      customer_key — canonical_customer_key repeats for merged duplicates.
      Intermediate model: not meant for direct consumption, only as input to
      marts/dim_customer and marts/fct_sales.
    columns:
      - name: customer_key
        description: Raw customer key (every one that exists in stg_dim_customer, exactly once).
        tests: [unique, not_null]
      - name: canonical_customer_key
        description: The canonical customer_key this raw key resolves to. Not unique — repeats for merged duplicates.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

  - name: int_fact_sales_validated
    description: |
      Classifies every raw sales row against business-logic rules (valid
      foreign keys, positive quantity, non-negative revenue, net <= gross,
      unique sales_key) and computes is_valid + a human-readable
      validation_errors reason. The quarantine pattern in one place: bad
      rows are neither silently dropped nor allowed to fail the whole build
      — marts/fct_sales takes only is_valid rows, marts/fct_sales_quarantine
      takes the rest. See docs/failure_cases.md §9. Intermediate model: not
      meant for direct consumption.
      Grain: one row per raw sales_key, including anomalous/duplicate rows.
    tests:
      # Internal consistency of the classification itself: exactly one of
      # (valid, no reason) or (invalid, has a reason) — never both or neither.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(is_valid and validation_errors is null) or (not is_valid and validation_errors is not null)"
    columns:
      - name: sales_key
        tests: [not_null]
      - name: is_valid
        tests: [not_null]
